# Course configuration for TeachRepo
# Docs: https://teachrepo.com/docs/course-format

course:
  title: "My Engineering Course"
  slug: "my-engineering-course"
  description: "A concise, practical course for engineers who want to learn X."
  author: "Your Name"
  email: "you@example.com"
  version: "1.0.0"
  language: "en"
  tags:
    - engineering
    - tutorial

# Pricing
pricing:
  model: "one_time"        # one_time | subscription | free
  amount_cents: 2900       # $29.00 USD
  currency: "usd"
  stripe_price_id: ""      # Fill in after creating price in Stripe

# Default pass threshold for all quizzes (can be overridden per quiz)
pass_threshold: 70

# Affiliate / referral tracking
affiliates:
  enabled: true
  default_commission_pct: 30   # 30% of sale price to affiliate
  cookie_days: 30              # Affiliate attribution window in days

# Lessons directory (relative to this file)
lessons_dir: "./lessons"

# Explicit lesson order by slug (optional — CLI uses NN- filename prefix if omitted)
lessons_order:
  - "introduction"
  - "getting-started"
  - "advanced-topics"

# Optional: gated code sandboxes (requires SaaS tier)
sandboxes:
  enabled: true
  provider: "codesandbox"   # codesandbox | stackblitz | codepen

# Optional: certificate of completion
certificate:
  enabled: true
  template: "default"
