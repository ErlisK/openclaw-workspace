# ─────────────────────────────────────────────────────────────────────────────
# Deploy Staging
#
# Triggers: push to staging branch
# Purpose:  Persistent staging environment for burn-in testing (H1/H2/H3)
#
# Staging env vars (set in Vercel project dashboard):
#   NEXT_PUBLIC_FLAG_FOCUS_MODE_DEFAULT = 1   (Focus Mode on by default)
#   NEXT_PUBLIC_SEED_DATA               = true (inject seed tasks)
#   NEXT_PUBLIC_FLAG_AUTH_ENABLED       = 1
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true   # cancel old staging deploys on new push

jobs:
  deploy-staging:
    name: Vercel Staging Deploy
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Build for staging (preview)
        run: npx vercel build --token ${{ secrets.VERCEL_ACCESS_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy staging preview
        id: deploy
        run: |
          PREVIEW_URL=$(npx vercel deploy --prebuilt \
            --token ${{ secrets.VERCEL_ACCESS_TOKEN }} 2>&1 \
            | grep -E "^https://" | tail -1)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Staging URL: ${PREVIEW_URL}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke check staging
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.preview_url }}")
          echo "Staging HTTP status: $STATUS"
          # Don't fail on non-200 (preview URLs can be slow to propagate)

      - name: Run smoke tests against staging
        continue-on-error: true
        run: |
          SMOKE_BASE_URL="${{ steps.deploy.outputs.preview_url }}" npm run test:smoke
        env:
          CI: true

      - name: Staging summary
        run: |
          echo "## 🧪 Staging Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging URL | ${{ steps.deploy.outputs.preview_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Feature Flags (staging)" >> $GITHUB_STEP_SUMMARY
          echo "| Flag | Staging Value | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| FOCUS_MODE_DEFAULT | 1 | Focus Mode on by default |" >> $GITHUB_STEP_SUMMARY
          echo "| SEED_DATA | true | Pre-loaded demo tasks |" >> $GITHUB_STEP_SUMMARY
          echo "| AUTH_ENABLED | 1 | Show sync button |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Hypothesis Burn-in" >> $GITHUB_STEP_SUMMARY
          echo "- **H1**: Median completion < 60s" >> $GITHUB_STEP_SUMMARY
          echo "- **H2**: ≥70% keyboard completions" >> $GITHUB_STEP_SUMMARY
          echo "- **H3**: Error rate < 1% over 24h" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Open the staging URL and complete 5 tasks via keyboard to validate H1/H2._" >> $GITHUB_STEP_SUMMARY
