# ─────────────────────────────────────────────────────────────────────────────
# Deploy Preview — runs on every PR, posts Vercel preview URL as PR comment
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx vercel \
            --token ${{ secrets.VERCEL_ACCESS_TOKEN }} \
            --yes 2>&1)
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep "Preview:" | awk '{print $2}' | head -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha.slice(0, 7);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployed\n\n**URL:** ${url || 'Check Vercel dashboard'}\n**Commit:** \`${sha}\`\n\n_Smoke tests and Lighthouse budget run on merge to main._`
            });
