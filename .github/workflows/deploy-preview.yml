# ─────────────────────────────────────────────────────────────────────────────
# Deploy Preview — PR previews on Vercel
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Build preview
        run: npx vercel build --token ${{ secrets.VERCEL_ACCESS_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          PREVIEW_URL=$(npx vercel deploy --prebuilt \
            --token ${{ secrets.VERCEL_ACCESS_TOKEN }} 2>&1 \
            | grep -E "^https://" | tail -1)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${PREVIEW_URL}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha  = context.sha.slice(0, 7);
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: [
                '## 🚀 Preview Deployed',
                '',
                `**URL:** ${url || '_Check Vercel dashboard_'}`,
                `**Commit:** \`${sha}\``,
                '',
                '### Quick checks',
                '- [ ] Add task with `N` key → verify it appears',
                '- [ ] Press `P` → task promotes to Today',
                '- [ ] Press `Space` → task completes (moves to Completed)',
                '- [ ] Press `?` → keyboard shortcut help appears',
                '',
                '_Full smoke tests + Lighthouse run on merge to main._',
              ].join('\n'),
            });
