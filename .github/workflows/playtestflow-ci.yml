name: PlaytestFlow CI

on:
  push:
    branches: [main]
    paths:
      - 'startup-60-playtestflow-lean-startup-founding-plan/**'
      - '.github/workflows/playtestflow-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'startup-60-playtestflow-lean-startup-founding-plan/**'
      - '.github/workflows/playtestflow-ci.yml'

defaults:
  run:
    working-directory: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 0
        continue-on-error: true  # ESLint config may not be strict yet; report but don't block

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PLAYTESTFLOW_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PLAYTESTFLOW_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://playtestflow.vercel.app

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: lint-typecheck
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull --yes --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow

      - name: Build project
        run: |
          vercel build \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            2>&1 | grep -o 'https://[^ ]*')
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"
        working-directory: startup-60-playtestflow-lean-startup-founding-plan/apps/playtestflow

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = [
              '## 🚀 Preview Deployment',
              '',
              `**URL:** ${previewUrl}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Lint & Type Check | ✅ Passed |',
              '| Build | ✅ Passed |',
              '| Preview Deploy | ✅ Live |',
              '',
              `_Deployed from commit \`${{ github.sha }}\` on branch \`${{ github.head_ref }}\`_`,
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
