# =============================================================================
# Uptime Monitor — production health checks every 15 minutes
#
# Checks:
#   1. HTTP 200 on /
#   2. /api/health returns status=ok
#   3. /manifest.json + /sw.js accessible
#   4. Response time < 3000ms
#
# On failure: creates GitHub issue (auto-closes on recovery)
# =============================================================================
name: Uptime Monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

env:
  PROD_URL: "https://focusdo-rho.vercel.app"

jobs:
  health-check:
    name: Production Health
    runs-on: ubuntu-latest
    steps:

      # ── 1. Root path ────────────────────────────────────────────────────────
      - name: GET /
        id: root
        run: |
          RESULT=$(curl -s -w "\n%{http_code}\n%{time_total}" \
            --max-time 10 --retry 2 --retry-delay 3 \
            -o /tmp/body.html "${{ env.PROD_URL }}")
          HTTP=$(echo "$RESULT" | tail -2 | head -1)
          TIME=$(echo "$RESULT" | tail -1)
          echo "http=$HTTP" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "HTTP $HTTP — ${TIME}s"
          if [ "$HTTP" != "200" ]; then
            echo "❌ Root path returned HTTP $HTTP"
            exit 1
          fi
          echo "✅ Root OK (HTTP $HTTP, ${TIME}s)"

      # ── 2. Health API ────────────────────────────────────────────────────────
      - name: GET /api/health
        id: health
        run: |
          BODY=$(curl -s --max-time 10 --retry 2 \
            "${{ env.PROD_URL }}/api/health")
          echo "$BODY"
          STATUS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "parse_error")
          echo "api_status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "ok" ]; then
            echo "❌ Health API returned status=$STATUS"
            exit 1
          fi
          VERSION=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null)
          echo "✅ Health API OK (version=$VERSION)"

      # ── 3. PWA assets ────────────────────────────────────────────────────────
      - name: GET /manifest.json
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ env.PROD_URL }}/manifest.json")
          [ "$HTTP" = "200" ] && echo "✅ manifest.json OK" \
            || (echo "❌ manifest.json HTTP $HTTP" && exit 1)

      - name: GET /sw.js
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ env.PROD_URL }}/sw.js")
          [ "$HTTP" = "200" ] && echo "✅ sw.js OK" \
            || (echo "❌ sw.js HTTP $HTTP" && exit 1)

      - name: GET /icons/icon-192.png
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ env.PROD_URL }}/icons/icon-192.png")
          [ "$HTTP" = "200" ] && echo "✅ icon-192.png OK" \
            || (echo "❌ icon-192.png HTTP $HTTP" && exit 1)

      # ── 4. Response time budget ──────────────────────────────────────────────
      - name: P90 response time < 3s
        run: |
          TOTAL_MS=0
          for i in 1 2 3; do
            T=$(curl -s -o /dev/null -w "%{time_total}" --max-time 5 "${{ env.PROD_URL }}")
            MS=$(echo "$T * 1000" | bc | cut -d. -f1)
            TOTAL_MS=$((TOTAL_MS + MS))
            echo "  Run $i: ${MS}ms"
            sleep 1
          done
          AVG=$((TOTAL_MS / 3))
          echo "Average: ${AVG}ms (budget: 3000ms)"
          if [ "$AVG" -gt 3000 ]; then
            echo "⚠️ Response time ${AVG}ms exceeds 3000ms budget"
            # Warning only — don't fail (CDN cold start can spike)
          else
            echo "✅ Response time OK (${AVG}ms)"
          fi

      # ── 5. Alert on failure ──────────────────────────────────────────────────
      - name: Create incident issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const root   = '${{ steps.root.outputs.http   }}';
            const health = '${{ steps.health.outputs.api_status }}';

            // Check if a recent open incident issue exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'incident',
              state: 'open',
            });

            // Don't create duplicate if one is already open
            if (issues.data.length > 0) {
              console.log(`Existing incident #${issues.data[0].number} — adding comment`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issues.data[0].number,
                body: `🔄 Health check still failing at ${now}\n- HTTP: ${root || '?'}\n- API: ${health || '?'}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🚨 Production down — ${now}`,
              labels: ['incident', 'production'],
              body: [
                '## Production Health Check Failure',
                '',
                `**URL:** https://focusdo-rho.vercel.app`,
                `**Time:** ${now}`,
                `**HTTP status:** ${root || 'check failed'}`,
                `**Health API:** ${health || 'check failed'}`,
                '',
                '## Immediate Actions',
                '1. Check [Vercel dashboard](https://vercel.com/dashboard) for deployment status',
                '2. Check [GitHub Actions](https://github.com/ErlisK/openclaw-workspace/actions) for recent deploy failures',
                '3. Check [Sentry](https://sentry.io) for error spikes',
                '4. If needed: roll back via `vercel rollback --token $VERCEL_ACCESS_TOKEN`',
                '',
                '## Auto-close',
                'This issue will be auto-closed when health checks pass.',
              ].join('\n'),
            });

      - name: Close resolved incident
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'incident',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body:  `✅ Health check passed — incident resolved at ${new Date().toISOString()}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
