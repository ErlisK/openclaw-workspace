name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PROD_URL:    "https://focusdo-rho.vercel.app"
  STAGING_URL: "https://focusdo-rho.vercel.app"   # same domain; staging uses preview URL

jobs:
  # ── 1. Type-check + unit tests ────────────────────────────────────────────
  unit:
    name: Type-check + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npm run type-check
      - name: Unit tests (47 tests, 2 files)
        run: npm run test:unit -- --reporter=verbose
      - name: Coverage summary
        run: npm run test:unit -- --coverage --reporter=dot 2>&1 | grep -E "All files|Statements|Branches" || true

  # ── 2. Next.js production build ───────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle report
        run: |
          echo "## 📦 Bundle Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ── 3. HTTP smoke tests ───────────────────────────────────────────────────
  smoke:
    name: HTTP Smoke (staging)
    runs-on: ubuntu-latest
    needs: [unit, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: HTTP smoke tests
        run: SMOKE_BASE_URL=${{ env.PROD_URL }} npm run test:smoke -- --reporter=verbose

  # ── 4. Playwright E2E ────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (staging)
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E — critical path + analytics
        run: >
          SMOKE_BASE_URL=${{ env.PROD_URL }}
          npx playwright test tests/e2e/app.spec.ts
          --project=chromium --timeout=30000
        timeout-minutes: 10
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 7

  # ── 5. Performance + observability E2E ───────────────────────────────────
  perf:
    name: Performance & Observability
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Perf + Sentry + PWA tests
        run: >
          SMOKE_BASE_URL=${{ env.PROD_URL }}
          npx playwright test tests/e2e/perf-observability.spec.ts
          --project=chromium --timeout=30000
        timeout-minutes: 10
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-perf
          path: playwright-report/
          retention-days: 7

  # ── 6. Lighthouse CI (on main push only) ─────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm install -g @lhci/cli@0.14.x
      - name: Run LHCI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
