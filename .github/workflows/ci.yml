name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  SMOKE_URL: "https://focusdo-rho.vercel.app"

jobs:
  # ── 1. Type check + unit tests ────────────────────────────────────────────
  unit:
    name: Type-check + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npm run type-check
      - name: Unit tests
        run: npm run test:unit -- --reporter=verbose

  # ── 2. Build ──────────────────────────────────────────────────────────────
  build:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle size report
        run: |
          echo "## Bundle size" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -h | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo "Total .next/static:" >> $GITHUB_STEP_SUMMARY
          du -sh .next/static >> $GITHUB_STEP_SUMMARY

  # ── 3. HTTP smoke tests ───────────────────────────────────────────────────
  smoke:
    name: HTTP Smoke Tests (staging)
    runs-on: ubuntu-latest
    needs: [unit, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Smoke tests
        run: SMOKE_BASE_URL=${{ env.SMOKE_URL }} npm run test:smoke -- --reporter=verbose

  # ── 4. Playwright E2E ────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E (staging)
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: SMOKE_BASE_URL=${{ env.SMOKE_URL }} npx playwright test tests/e2e/app.spec.ts --timeout=30000
        timeout-minutes: 10
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 5. Performance + observability E2E ───────────────────────────────────
  perf:
    name: Performance & Observability Tests
    runs-on: ubuntu-latest
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Run perf tests
        run: SMOKE_BASE_URL=${{ env.SMOKE_URL }} npx playwright test tests/e2e/perf-observability.spec.ts --timeout=30000
        timeout-minutes: 10
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: perf-playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 6. Lighthouse CI (weekly on main) ────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x
      - name: Run Lighthouse
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Summary
        run: |
          echo "## Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          cat .lighthouseci/lhr-*.json 2>/dev/null | python3 -c "
          import json,sys
          for line in sys.stdin:
            try:
              d=json.loads(line)
              cats=d.get('categories',{})
              print('| Category | Score |')
              print('|----------|-------|')
              for k,v in cats.items():
                score=v.get('score',0)
                print(f'| {k} | {score*100:.0f} |')
            except: pass
          " >> $GITHUB_STEP_SUMMARY || true
