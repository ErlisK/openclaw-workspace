name: ClipSpark Render Worker

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip ffmpeg + upload)'
        required: false
        default: 'false'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: startup-78-clipspark-yc-pg-style-founding-plan

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + fonts
        run: |
          sudo apt-get install -y ffmpeg fonts-liberation --no-install-recommends

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run render worker
        run: |
          ARGS="--once"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 workers/render_worker.py $ARGS
        env:
          SUPABASE_URL: https://twctmwwqxvenvieijmtn.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CLIPSPARK_SERVICE_ROLE_KEY }}
          WATERMARK_TEXT: CLIPSPARK PREVIEW
          MAX_PREVIEW_DURATION: '90'
