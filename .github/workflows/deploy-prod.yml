# ─────────────────────────────────────────────────────────────────────────────
# Deploy Production
#
# Triggers: push to main (after CI passes)
# Strategy: vercel build --prod then vercel deploy --prebuilt --prod
#           (workaround for "vercel --prod" CLI bug on this project)
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel an in-flight production deploy

jobs:
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://focusdo-rho.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Build for production
        run: npx vercel build --prod --token ${{ secrets.VERCEL_ACCESS_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt artifacts
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod \
            --token ${{ secrets.VERCEL_ACCESS_TOKEN }} 2>&1 \
            | grep -E "^https://" | tail -1)
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${DEPLOY_URL}"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post-deploy smoke check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://focusdo-rho.vercel.app)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production smoke check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Production live: https://focusdo-rho.vercel.app (HTTP $STATUS)"

      - name: HTTP smoke tests against production
        run: SMOKE_BASE_URL=https://focusdo-rho.vercel.app npm run test:smoke
        env:
          CI: true

      - name: Notify Sentry of new release
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        continue-on-error: true
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases set-commits "${{ github.sha }}" --auto
          npx @sentry/cli releases finalize "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    focusdo

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://focusdo-rho.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview URL | ${{ steps.deploy.outputs.deploy_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`main\` |" >> $GITHUB_STEP_SUMMARY
