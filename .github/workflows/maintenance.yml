# =============================================================================
# Daily Maintenance — 03:00 UTC every day
#
# Jobs:
#   1. backup-export   — pg_dump to GitHub artifact (free tier backup)
#   2. error-rate      — H3 check via /api/health + Sentry
#   3. perf-audit      — Lighthouse on Mondays
#   4. cleanup         — database maintenance procedure
# =============================================================================
name: Daily Maintenance

on:
  schedule:
    - cron: "0 3 * * *"     # 03:00 UTC daily
  workflow_dispatch:         # manual trigger

env:
  PROD_URL: "https://focusdo-rho.vercel.app"

jobs:

  # ── 1. Backup: export Supabase data to GitHub artifact ─────────────────────
  backup-export:
    name: Supabase Backup Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase backup availability
        id: check
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ SUPABASE_DB_URL not set — using logical backup strategy"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Supabase Free tier — logical backup via REST API
        if: steps.check.outputs.configured == 'false'
        run: |
          echo "=== Backup Strategy: Supabase Free Tier ==="
          echo ""
          echo "Supabase Free does NOT include PITR or scheduled exports."
          echo "Recommended approach:"
          echo "  1. Set SUPABASE_DB_URL in GitHub Secrets (from Supabase → Settings → Database)"
          echo "  2. This job will then run pg_dump daily and upload as artifact"
          echo ""
          echo "Manual backup command:"
          echo "  pg_dump \$SUPABASE_DB_URL | gzip > backup-\$(date +%Y%m%d).sql.gz"
          echo ""
          echo "📦 Backup status: PENDING (needs SUPABASE_DB_URL secret)"

      - name: pg_dump backup
        if: steps.check.outputs.configured == 'true'
        run: |
          BACKUP_FILE="focusdo-backup-$(date +%Y%m%d-%H%M%S).sql.gz"
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" \
            --no-owner \
            --no-acl \
            --exclude-table='auth.*' \
            --exclude-table='storage.*' \
            --exclude-table='vault.*' \
            | gzip > "$BACKUP_FILE"
          echo "backup_file=$BACKUP_FILE" >> $GITHUB_OUTPUT
          ls -lh "$BACKUP_FILE"

      - name: Upload backup artifact
        if: steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: "supabase-backup-${{ github.run_id }}"
          path: "*.sql.gz"
          retention-days: 30   # free: 90 day max, keep 30 for storage

      - name: Backup report
        run: |
          echo "## 💾 Backup Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.configured }}" = "true" ]; then
            echo "✅ pg_dump completed — artifact retained for 30 days" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ SUPABASE_DB_URL not set — backup pending configuration" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required:** Add \`SUPABASE_DB_URL\` to GitHub Secrets" >> $GITHUB_STEP_SUMMARY
            echo "(Supabase → Settings → Database → Connection string → URI)" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 2. H3 Error rate + uptime health ──────────────────────────────────────
  error-rate-check:
    name: H3 Error Rate (48h window)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Health API check
        run: |
          BODY=$(curl -s --max-time 10 "${{ env.PROD_URL }}/api/health")
          echo "$BODY" | python3 -m json.tool
          STATUS=$(echo "$BODY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','?'))")
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] && echo "✅ Production healthy" || (echo "❌ Production degraded" && exit 1)

      - name: HTTP smoke tests
        run: SMOKE_BASE_URL=${{ env.PROD_URL }} npm run test:smoke
        env:
          CI: true

      - name: Sentry error rate note
        run: |
          if [ -z "${{ secrets.SENTRY_AUTH_TOKEN }}" ]; then
            echo "⚠️ SENTRY_AUTH_TOKEN not set — check dashboard manually"
            echo "   https://sentry.io → Projects → focusdo → Stats"
            echo "   Target: error rate < 1% (H3)"
          else
            echo "✅ Sentry configured — check dashboard for 48h error rate"
            echo "   Target: < 1% errors / total events"
          fi

      - name: Hypothesis status report
        run: |
          echo "## 📊 Hypothesis Status (Daily)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Hypothesis | Target | Check |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| H1: Median completion < 60s | < 60 000ms | 📊 In-app dashboard |" >> $GITHUB_STEP_SUMMARY
          echo "| H2: ≥70% keyboard completions | ≥ 70% | 📊 In-app dashboard |" >> $GITHUB_STEP_SUMMARY
          echo "| H3: Error rate < 1% | < 1% | 🔍 Sentry |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Last health check: $(date -u)_" >> $GITHUB_STEP_SUMMARY

  # ── 3. Weekly performance audit (Mondays only) ────────────────────────────
  perf-audit:
    name: Performance Audit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.schedule == '0 3 * * *' &&
       contains(fromJson('["Mon"]'),
       format('{0}', toJson(github.event.repository.updated_at))))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm install -g @lhci/cli@0.14.x

      - name: Lighthouse CI audit
        run: lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Response time P90 sample
        run: |
          echo "## ⚡ Performance Sample" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Run | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          TOTAL=0
          for i in 1 2 3 4 5; do
            T=$(curl -s -o /dev/null -w "%{time_total}" --max-time 10 "${{ env.PROD_URL }}")
            MS=$(echo "$T * 1000" | bc | cut -d. -f1)
            echo "| Run $i | ${MS}ms |" >> $GITHUB_STEP_SUMMARY
            TOTAL=$((TOTAL + MS))
            sleep 2
          done
          AVG=$((TOTAL / 5))
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Average:** ${AVG}ms (target: < 1500ms P90)" >> $GITHUB_STEP_SUMMARY

  # ── 4. Database cleanup ───────────────────────────────────────────────────
  db-cleanup:
    name: Database Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup (if Supabase configured)
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "⚠️ SUPABASE_DB_URL not set — skipping database cleanup"
            exit 0
          fi
          # Run cleanup functions
          psql "${{ secrets.SUPABASE_DB_URL }}" \
            -c "SELECT public.cleanup_old_sessions();" \
            -c "SELECT * FROM public.cleanup_old_deleted_tasks();" \
            -c "SELECT * FROM public.v_backup_status;" || true
          echo "✅ Database cleanup complete"
