<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Window frame background -->
  <rect x="10" y="10" width="180" height="180" rx="20" fill="#6366f1"/>
  <!-- Title bar -->
  <rect x="10" y="10" width="180" height="46" rx="20" fill="#4f46e5"/>
  <rect x="10" y="30" width="180" height="26" fill="#4f46e5"/>
  <!-- Traffic lights -->
  <circle cx="38" cy="33" r="7" fill="#f87171"/>
  <circle cx="62" cy="33" r="7" fill="#fbbf24"/>
  <circle cx="86" cy="33" r="7" fill="#34d399"/>
  <!-- Address bar -->
  <rect x="104" y="24" width="72" height="18" rx="9" fill="rgba(255,255,255,0.15)"/>
  <!-- Window content area -->
  <rect x="18" y="56" width="164" height="126" rx="4" fill="rgba(255,255,255,0.08)"/>
  <!-- Beta symbol -->
  <text x="100" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="bold" fill="white" text-anchor="middle" opacity="0.92">β</text>
</svg>
