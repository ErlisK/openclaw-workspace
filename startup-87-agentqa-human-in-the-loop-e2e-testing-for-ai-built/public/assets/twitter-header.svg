<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.3" stroke-opacity="0.1"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Left: Big tagline -->
  <text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Human QA</text>
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#A5B4FC">for AI-built apps.</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" fill-opacity="0.8">Real testers. Real bugs. Starting at $5.</text>

  <!-- Right: Flow diagram -->
  <!-- Step 1 card -->
  <rect x="900" y="80" width="180" height="80" rx="12" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="920" y="110" font-family="system-ui" font-size="11" fill="white" fill-opacity="0.6">STEP 1</text>
  <text x="920" y="135" font-family="system-ui" font-size="16" font-weight="600" fill="white">Post URL</text>
  <text x="920" y="155" font-family="system-ui" font-size="12" fill="white" fill-opacity="0.7">via API or dashboard</text>

  <!-- Arrow down -->
  <path d="M 990 165 L 990 195" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <path d="M 983 190 L 990 200 L 997 190" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Step 2 card -->
  <rect x="900" y="200" width="180" height="80" rx="12" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <text x="920" y="230" font-family="system-ui" font-size="11" fill="white" fill-opacity="0.6">STEP 2</text>
  <text x="920" y="255" font-family="system-ui" font-size="16" font-weight="600" fill="white">Human tests it</text>
  <text x="920" y="275" font-family="system-ui" font-size="12" fill="white" fill-opacity="0.7">10–30 minute session</text>

  <!-- Arrow down -->
  <path d="M 990 285 L 990 315" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
  <path d="M 983 310 L 990 320 L 997 310" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Step 3 card (green) -->
  <rect x="900" y="320" width="180" height="80" rx="12" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.5" stroke-width="1"/>
  <text x="920" y="350" font-family="system-ui" font-size="11" fill="#6EE7B7">STEP 3</text>
  <text x="920" y="375" font-family="system-ui" font-size="16" font-weight="600" fill="white">Bug report ✓</text>
  <text x="920" y="395" font-family="system-ui" font-size="12" fill="white" fill-opacity="0.7">logs + console + feedback</text>

  <!-- Right edge: pricing pill -->
  <rect x="1130" y="170" width="290" height="160" rx="16" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1150" y="205" font-family="system-ui" font-size="13" fill="white" fill-opacity="0.7" font-weight="600">PRICING</text>
  <text x="1150" y="240" font-family="system-ui" font-size="22" font-weight="700" fill="white">$5 Quick (10 min)</text>
  <text x="1150" y="270" font-family="system-ui" font-size="22" font-weight="700" fill="white">$10 Standard (20 min)</text>
  <text x="1150" y="300" font-family="system-ui" font-size="22" font-weight="700" fill="white">$15 Deep (30 min)</text>

  <!-- Bottom: website URL -->
  <text x="80" y="460" font-family="system-ui" font-size="20" fill="white" fill-opacity="0.6">agentqa.io</text>
  
  <!-- Bottom right: tagline pill -->
  <rect x="1250" y="435" width="210" height="40" rx="20" fill="white" fill-opacity="0.15"/>
  <text x="1270" y="461" font-family="system-ui" font-size="15" fill="white" font-weight="600">Built for AI agents 🤖</text>
</svg>
