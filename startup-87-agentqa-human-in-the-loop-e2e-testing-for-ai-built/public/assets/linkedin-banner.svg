<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" fill="none">
  <!-- LinkedIn banner format: 1128x191 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="1128" height="191" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="white" fill-opacity="0.08"/>
  </pattern>
  <rect width="1128" height="191" fill="url(#dots)"/>

  <!-- Left: Tagline -->
  <text x="50" y="75" font-family="system-ui" font-size="38" font-weight="800" fill="white">AgentQA</text>
  <text x="50" y="115" font-family="system-ui" font-size="22" fill="#93C5FD">Human QA Testing for AI-Built Apps</text>
  <text x="50" y="150" font-family="system-ui" font-size="15" fill="white" fill-opacity="0.6">Real testers · Network logs · Console captures · From $5</text>

  <!-- Right: Green check badge -->
  <circle cx="1010" cy="96" r="60" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="980" y="80" font-family="system-ui" font-size="14" fill="#6EE7B7" text-anchor="middle">VERIFIED</text>
  <text x="1010" y="108" font-family="system-ui" font-size="46" fill="white" text-anchor="middle">✓</text>
  <text x="1010" y="135" font-family="system-ui" font-size="12" fill="white" fill-opacity="0.6" text-anchor="middle">Human-tested</text>
</svg>
