<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusDo — Offline</title>
  <meta name="theme-color" content="#6ee7b7" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo { font-size: 1rem; font-weight: 700; color: #6ee7b7; margin-bottom: 2rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    h1 { font-size: 1.1rem; color: #e8e8e8; margin-bottom: 0.5rem; }
    p  { font-size: 0.85rem; color: #666; line-height: 1.5; max-width: 22rem; }
    .tasks-note {
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid #222;
      border-radius: 0.75rem;
      font-size: 0.8rem;
      color: #555;
      max-width: 22rem;
    }
    .tasks-note strong { color: #6ee7b7; }
    button {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border: 1px solid #2a2a2a;
      border-radius: 0.5rem;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button:hover { border-color: #6ee7b7; color: #6ee7b7; }
  </style>
</head>
<body>
  <div class="logo">FocusDo</div>
  <div class="icon">📴</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Your tasks are saved locally — reconnect to sync.</p>
  <div class="tasks-note">
    <strong>Good news:</strong> Your tasks are stored in this browser and won't be lost.
    They'll sync automatically when you're back online.
  </div>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
