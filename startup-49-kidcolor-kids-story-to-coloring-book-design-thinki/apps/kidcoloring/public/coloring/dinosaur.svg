  <path d="M420,680 Q430,750 440,800 Q450,820 440,840 Q400,860 375,830 Q370,800 370,740 Q368,700 390,670" fill="white" stroke="black" stroke-width="10"/>
  <!-- Tail -->
  <path d="M230,600 Q150,620 100,580 Q70,555 90,530 Q120,510 180,540 Q220,570 280,580" fill="white" stroke="black" stroke-width="10"/>
  <!-- Spines on back -->
  <path d="M280,480 L265,440 L280,460" fill="none" stroke="black" stroke-width="6"/>
  <path d="M320,450 L310,405 L325,425" fill="none" stroke="black" stroke-width="6"/>
