  <path d="M272,845 L265,872" stroke="black" stroke-width="7"/>
  <path d="M288,843 L287,870" stroke="black" stroke-width="7"/>
  <path d="M310,690 Q330,760 345,820 Q350,845 375,845 Q398,842 390,817 Q378,775 370,700" fill="white" stroke="black" stroke-width="9"/>
