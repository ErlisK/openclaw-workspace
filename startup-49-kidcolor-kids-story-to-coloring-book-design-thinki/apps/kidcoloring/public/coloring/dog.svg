  <path d="M355,430 Q370,450 384,435 Q398,450 413,430" fill="none" stroke="black" stroke-width="7"/>
  <!-- Tongue -->
  <path d="M370,448 Q384,470 398,448" fill="none" stroke="black" stroke-width="6"/>
