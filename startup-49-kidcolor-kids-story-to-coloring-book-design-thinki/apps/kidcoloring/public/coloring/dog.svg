  <circle cx="320" cy="312" r="5" fill="black"/>
  <circle cx="340" cy="308" r="5" fill="black"/>
  <!-- Collar -->
  <path d="M258,498 Q384,535 510,498" fill="none" stroke="black" stroke-width="9"/>
  <!-- Tag -->
  <circle cx="384" cy="520" r="18" fill="white" stroke="black" stroke-width="6"/>
  <text x="384" y="526" font-size="14" text-anchor="middle" fill="black" font-family="Arial">♥</text>
