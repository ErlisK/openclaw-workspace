  <circle cx="330" cy="345" r="32" fill="white" stroke="black" stroke-width="9"/>
  <circle cx="438" cy="345" r="32" fill="white" stroke="black" stroke-width="9"/>
  <circle cx="330" cy="345" r="17" fill="black"/>
  <circle cx="438" cy="345" r="17" fill="black"/>
