  <!-- Fins right -->
  <path d="M458,550 Q528,580 558,650 L458,650 Z" fill="white" stroke="black" stroke-width="9"/>
  <!-- Engine nozzle -->
  <path d="M330,650 Q320,695 310,720 Q330,710 384,715 Q438,710 458,720 Q448,695 438,650 Z" fill="white" stroke="black" stroke-width="9"/>
  <!-- Flame -->
