  <text x="120" y="220" font-size="36" fill="none" stroke="black" stroke-width="3">★</text>
  <text x="580" y="200" font-size="28" fill="none" stroke="black" stroke-width="2.5">★</text>
  <text x="640" y="320" font-size="22" fill="none" stroke="black" stroke-width="2">★</text>
  <text x="100" y="380" font-size="26" fill="none" stroke="black" stroke-width="2.5">★</text>
  <text x="660" y="460" font-size="18" fill="none" stroke="black" stroke-width="2">✦</text>
  <text x="130" y="500" font-size="20" fill="none" stroke="black" stroke-width="2">✦</text>
  <!-- Planet -->
