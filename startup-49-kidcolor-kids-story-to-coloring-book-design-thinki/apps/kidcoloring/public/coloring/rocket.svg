  <text x="384" y="993" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="black">KidColoring · Color me! 🎨</text>
  <!-- Main art -->

  <!-- Rocket body -->
  <path d="M384,160 Q330,200 310,350 L310,650 Q310,680 384,680 Q458,680 458,650 L458,350 Q438,200 384,160 Z" fill="white" stroke="black" stroke-width="10"/>
