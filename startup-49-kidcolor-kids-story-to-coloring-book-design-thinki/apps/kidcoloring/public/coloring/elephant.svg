  <path d="M415,740 L420,840 Q422,868 450,868 Q478,868 476,840 L468,740" fill="white" stroke="black" stroke-width="10"/>
  <path d="M500,720 L510,840 Q513,868 538,866 Q563,864 558,838 L545,720" fill="white" stroke="black" stroke-width="10"/>
