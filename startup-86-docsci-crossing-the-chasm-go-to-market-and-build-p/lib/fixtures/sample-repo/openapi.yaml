openapi: "3.1.0"
info:
  title: Acme API
  version: "2.1.0"
  description: |
    Sample Acme API — used by DocsCI to detect SDK/API drift.
    Note: The docs reference `client.connect()` but this spec shows `init()`.
    DocsCI will flag that as a drift finding.
  contact:
    email: hello@snippetci.com

servers:
  - url: https://api.acme.com/v2
    description: Production
  - url: https://staging-api.acme.com/v2
    description: Staging (smoke tests)

paths:
  /init:
    post:
      operationId: initClient
      summary: Initialize client session (replaces deprecated /connect)
      description: |
        **Breaking change in v2.0**: `POST /connect` has been removed.
        Use `POST /init` instead. Docs still reference `client.connect()` — this is a drift finding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitRequest"
      responses:
        "200":
          description: Session initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          description: Invalid API key

  /status:
    get:
      operationId: getStatus
      summary: Get client status
      responses:
        "200":
          description: Current session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /users:
    get:
      operationId: listUsers
      summary: List users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /webhooks:
    post:
      operationId: createWebhook
      summary: Create webhook subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreate"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

components:
  schemas:
    InitRequest:
      type: object
      required: [api_key]
      properties:
        api_key:
          type: string
          example: sk_test_abc123
        environment:
          type: string
          enum: [production, staging, sandbox]
          default: production

    Session:
      type: object
      properties:
        session_id:
          type: string
        expires_at:
          type: string
          format: date-time
        environment:
          type: string

    Status:
      type: object
      properties:
        connected:
          type: boolean
        latency_ms:
          type: integer
        version:
          type: string

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time

    WebhookCreate:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - ApiKeyAuth: []
