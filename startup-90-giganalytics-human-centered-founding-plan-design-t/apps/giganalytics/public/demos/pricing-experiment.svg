<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340">
  <defs>
    <style>
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes growW { from{width:4px} to{width:var(--w)} }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

      .lf { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
      .card { fill:#fff; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.07)); }

      /* Phase 1: Control group fills */
      #ctl-bar { --w:240px; width:4px; animation: growW 0.8s 0.3s ease-out forwards; }
      #exp-bar { --w:310px; width:4px; animation: growW 0.8s 0.7s ease-out forwards; }

      /* Phase 2: Stat bubble */
      #stat-bubble { opacity:0; animation: fadeIn 0.6s 2s forwards; }
      #stat-badge  { opacity:0; animation: bounceIn 0.5s 2.8s forwards; }
      @keyframes bounceIn { 0%{opacity:0;transform:scale(0.5)} 70%{transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }

      /* Phase 3: Call to action */
      #cta-panel { opacity:0; animation: slideUp 0.6s 3.6s forwards; }
    </style>
  </defs>

  <rect width="640" height="340" fill="#f8fafc" rx="12"/>
  <rect width="640" height="44" fill="#1e293b" rx="12"/>
  <rect y="32" width="640" height="12" fill="#1e293b"/>
  <circle cx="20" cy="22" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="22" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="56" cy="22" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="320" y="27" text-anchor="middle" class="lf" font-size="12" font-weight="600" fill="#94a3b8">GigAnalytics — Pricing Lab A/B Experiment</text>

  <!-- Experiment header -->
  <text x="32" y="72" class="lf" font-size="15" font-weight="700" fill="#1e293b">Experiment: Consulting Rate</text>
  <text x="32" y="90" class="lf" font-size="11" fill="#94a3b8">Running 28 days · 142 sessions compared</text>

  <!-- Control variant card -->
  <rect x="32" y="104" width="274" height="88" rx="10" class="card"/>
  <text x="52" y="124" class="lf" font-size="12" font-weight="600" fill="#64748b">Control  —  $85/hr</text>
  <text x="52" y="142" class="lf" font-size="11" fill="#94a3b8">67 sessions · avg deal $3,400</text>
  <rect x="52" y="152" height="16" rx="8" fill="#94a3b8" id="ctl-bar"/>
  <text x="52" y="184" class="lf" font-size="20" font-weight="700" fill="#1e293b">$227,800</text>
  <text x="160" y="184" class="lf" font-size="11" fill="#94a3b8"> total revenue</text>

  <!-- Experiment variant card -->
  <rect x="334" y="104" width="274" height="88" rx="10" class="card"/>
  <text x="354" y="124" class="lf" font-size="12" font-weight="600" fill="#3b82f6">Variant  —  $105/hr</text>
  <text x="354" y="142" class="lf" font-size="11" fill="#94a3b8">75 sessions · avg deal $4,200</text>
  <rect x="354" y="152" height="16" rx="8" fill="#3b82f6" id="exp-bar"/>
  <text x="354" y="184" class="lf" font-size="20" font-weight="700" fill="#3b82f6">$315,000</text>
  <text x="458" y="184" class="lf" font-size="11" fill="#94a3b8"> total revenue</text>

  <!-- Statistical significance bubble -->
  <g id="stat-bubble">
    <rect x="32" y="208" width="576" height="56" rx="10" fill="#fff" filter="drop-shadow(0 2px 6px rgba(0,0,0,0.06))"/>
    <text x="52" y="228" class="lf" font-size="11" fill="#64748b">Statistical significance (two-proportion z-test)</text>

    <!-- Significance bar -->
    <rect x="52" y="238" width="440" height="16" rx="8" fill="#f1f5f9"/>
    <rect x="52" y="238" width="396" height="16" rx="8" fill="#3b82f6"/>
    <text x="502" y="251" class="lf" font-size="12" font-weight="700" fill="#3b82f6">94%</text>
    <text x="540" y="251" class="lf" font-size="10" fill="#94a3b8">confidence</text>
    <!-- Threshold line at 95% -->
    <line x1="469" y1="234" x2="469" y2="258" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="471" y="233" class="lf" font-size="8" fill="#ef4444">95% threshold</text>
  </g>

  <!-- Significance badge -->
  <g id="stat-badge">
    <rect x="430" y="206" width="178" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="519" y="228" text-anchor="middle" class="lf" font-size="11" font-weight="700" fill="#b45309">⚠ 6 more sessions needed</text>
    <text x="519" y="248" text-anchor="middle" class="lf" font-size="10" fill="#92400e">to reach significance</text>
    <text x="519" y="260" text-anchor="middle" class="lf" font-size="10" fill="#92400e">$87,200 lift detected</text>
  </g>

  <!-- CTA panel -->
  <g id="cta-panel">
    <rect x="32" y="278" width="576" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="52" y="298" class="lf" font-size="12" font-weight="600" fill="#1d4ed8">💡 Projected annual lift if variant wins:</text>
    <text x="300" y="298" class="lf" font-size="12" fill="#1e293b"> +$349K revenue at $105/hr rate</text>
    <text x="52" y="314" class="lf" font-size="10" fill="#3b82f6">Continue experiment → auto-promote when p &lt; 0.05</text>
  </g>
</svg>
