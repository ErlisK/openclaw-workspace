<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes growBar { from { width: 4px; } to { width: var(--w); } }
      @keyframes countUp { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes drawLine { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 0; } }

      .panel { fill: #fff; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }
      .lbl { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 11px; fill: #94a3b8; }
      .val { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 20px; font-weight: 700; fill: #1e293b; }
      .head { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 13px; font-weight: 600; fill: #1e293b; }
      .note { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 10px; fill: #64748b; }
      .green { fill: #16a34a; }
      .amber { fill: #d97706; }

      #stream1 { opacity: 0; animation: slideUp 0.5s 0.4s forwards; }
      #stream2 { opacity: 0; animation: slideUp 0.5s 1.1s forwards; }
      #stream3 { opacity: 0; animation: slideUp 0.5s 1.8s forwards; }

      #bar-s1 { --w: 380px; width: 4px; animation: growBar 0.8s 0.7s ease-out forwards; }
      #bar-s2 { --w: 268px; width: 4px; animation: growBar 0.8s 1.4s ease-out forwards; }
      #bar-s3 { --w: 196px; width: 4px; animation: growBar 0.8s 2.1s ease-out forwards; }

      #formula-box { opacity: 0; animation: fadeIn 0.6s 2.8s forwards; }
      #verdict { opacity: 0; animation: slideUp 0.6s 3.8s forwards; }
      #verdict rect { animation: pulse 2s 4.2s infinite; }
    </style>
  </defs>

  <rect width="640" height="380" fill="#f8fafc" rx="12"/>
  <rect width="640" height="44" fill="#1e293b" rx="12"/>
  <rect y="32" width="640" height="12" fill="#1e293b"/>
  <circle cx="20" cy="22" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="22" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="56" cy="22" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="320" y="27" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">GigAnalytics — True Hourly Rate Dashboard</text>

  <!-- Page title -->
  <text x="32" y="74" font-family="-apple-system,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Income Stream Comparison</text>
  <text x="32" y="90" font-family="-apple-system,sans-serif" font-size="11" fill="#94a3b8">Last 90 days · net revenue after platform fees ÷ hours tracked</text>

  <!-- Stream 1: Consulting -->
  <g id="stream1">
    <rect x="32" y="102" width="576" height="68" rx="10" class="panel"/>
    <text x="52" y="124" class="head">🏢 Consulting</text>
    <text x="52" y="140" class="lbl">$8,400 net revenue · 75 hrs</text>
    <rect x="52" y="150" height="14" rx="7" fill="#3b82f6" id="bar-s1"/>
    <text x="440" y="124" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="26" font-weight="800" fill="#3b82f6">$112.00</text>
    <text x="440" y="140" text-anchor="middle" class="lbl">/ hour</text>
    <rect x="508" y="114" width="80" height="22" rx="11" fill="#dcfce7"/>
    <text x="548" y="129" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#16a34a">Best stream ↑</text>
  </g>

  <!-- Stream 2: Upwork -->
  <g id="stream2">
    <rect x="32" y="182" width="576" height="68" rx="10" class="panel"/>
    <text x="52" y="204" class="head">💼 Upwork Freelance</text>
    <text x="52" y="220" class="lbl">$5,880 net revenue · 98 hrs (after 10% fee)</text>
    <rect x="52" y="230" height="14" rx="7" fill="#f59e0b" id="bar-s2"/>
    <text x="440" y="204" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="26" font-weight="800" fill="#f59e0b">$60.00</text>
    <text x="440" y="220" text-anchor="middle" class="lbl">/ hour</text>
    <rect x="500" y="194" width="96" height="22" rx="11" fill="#fef3c7"/>
    <text x="548" y="209" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#d97706">46% lower</text>
  </g>

  <!-- Stream 3: Digital product -->
  <g id="stream3">
    <rect x="32" y="262" width="576" height="68" rx="10" class="panel"/>
    <text x="52" y="284" class="head">📦 Digital Products</text>
    <text x="52" y="300" class="lbl">$1,960 net revenue · 28 hrs (setup + support)</text>
    <rect x="52" y="310" height="14" rx="7" fill="#10b981" id="bar-s3"/>
    <text x="440" y="284" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="26" font-weight="800" fill="#10b981">$70.00</text>
    <text x="440" y="300" text-anchor="middle" class="lbl">/ hour</text>
    <rect x="494" y="274" width="108" height="22" rx="11" fill="#d1fae5"/>
    <text x="548" y="289" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#065f46">Good passive ROI</text>
  </g>

  <!-- Formula box -->
  <g id="formula-box">
    <rect x="32" y="342" width="576" height="26" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="52" y="358" font-family="monospace" font-size="11" fill="#3b82f6">true_hourly = (gross_revenue − platform_fees − acq_costs) ÷ hours_tracked</text>
  </g>
</svg>
