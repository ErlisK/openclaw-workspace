<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380">
  <defs>
    <style>
      @keyframes fadeCell {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes popIn   { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

      .celltext { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 9px; font-weight: 600; }
      .axislabel { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 10px; fill: #94a3b8; }
      .legend-text { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 10px; fill: #64748b; }
      .insight { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 12px; fill: #1e293b; }

      /* Heatmap cells — 7 days × 9 time slots = 63 cells staggered */
      .cell { opacity: 0; transform-origin: center; }

      /* Row 0 (9-10 AM) */
      .r0c0 { animation: fadeCell 0.3s 0.2s forwards; }
      .r0c1 { animation: fadeCell 0.3s 0.25s forwards; }
      .r0c2 { animation: fadeCell 0.3s 0.3s forwards; }
      .r0c3 { animation: fadeCell 0.3s 0.35s forwards; }
      .r0c4 { animation: fadeCell 0.3s 0.4s forwards; }
      .r0c5 { animation: fadeCell 0.3s 0.45s forwards; }
      .r0c6 { animation: fadeCell 0.3s 0.5s forwards; }
      /* Row 1 */
      .r1c0 { animation: fadeCell 0.3s 0.55s forwards; }
      .r1c1 { animation: fadeCell 0.3s 0.6s forwards; }
      .r1c2 { animation: fadeCell 0.3s 0.65s forwards; }
      .r1c3 { animation: fadeCell 0.3s 0.7s forwards; }
      .r1c4 { animation: fadeCell 0.3s 0.75s forwards; }
      .r1c5 { animation: fadeCell 0.3s 0.8s forwards; }
      .r1c6 { animation: fadeCell 0.3s 0.85s forwards; }
      /* Row 2 */
      .r2c0 { animation: fadeCell 0.3s 0.9s forwards; }
      .r2c1 { animation: fadeCell 0.3s 0.95s forwards; }
      .r2c2 { animation: fadeCell 0.3s 1.0s forwards; }
      .r2c3 { animation: fadeCell 0.3s 1.05s forwards; }
      .r2c4 { animation: fadeCell 0.3s 1.1s forwards; }
      .r2c5 { animation: fadeCell 0.3s 1.15s forwards; }
      .r2c6 { animation: fadeCell 0.3s 1.2s forwards; }
      /* Row 3 */
      .r3c0 { animation: fadeCell 0.3s 1.25s forwards; }
      .r3c1 { animation: fadeCell 0.3s 1.3s forwards; }
      .r3c2 { animation: fadeCell 0.3s 1.35s forwards; }
      .r3c3 { animation: fadeCell 0.3s 1.4s forwards; }
      .r3c4 { animation: fadeCell 0.3s 1.45s forwards; }
      .r3c5 { animation: fadeCell 0.3s 1.5s forwards; }
      .r3c6 { animation: fadeCell 0.3s 1.55s forwards; }
      /* Row 4 */
      .r4c0 { animation: fadeCell 0.3s 1.6s forwards; }
      .r4c1 { animation: fadeCell 0.3s 1.65s forwards; }
      .r4c2 { animation: fadeCell 0.3s 1.7s forwards; }
      .r4c3 { animation: fadeCell 0.3s 1.75s forwards; }
      .r4c4 { animation: fadeCell 0.3s 1.8s forwards; }
      .r4c5 { animation: fadeCell 0.3s 1.85s forwards; }
      .r4c6 { animation: fadeCell 0.3s 1.9s forwards; }
      /* Row 5 */
      .r5c0 { animation: fadeCell 0.3s 1.95s forwards; }
      .r5c1 { animation: fadeCell 0.3s 2.0s forwards; }
      .r5c2 { animation: fadeCell 0.3s 2.05s forwards; }
      .r5c3 { animation: fadeCell 0.3s 2.1s forwards; }
      .r5c4 { animation: fadeCell 0.3s 2.15s forwards; }
      .r5c5 { animation: fadeCell 0.3s 2.2s forwards; }
      .r5c6 { animation: fadeCell 0.3s 2.25s forwards; }
      /* Row 6 */
      .r6c0 { animation: fadeCell 0.3s 2.3s forwards; }
      .r6c1 { animation: fadeCell 0.3s 2.35s forwards; }
      .r6c2 { animation: fadeCell 0.3s 2.4s forwards; }
      .r6c3 { animation: fadeCell 0.3s 2.45s forwards; }
      .r6c4 { animation: fadeCell 0.3s 2.5s forwards; }
      .r6c5 { animation: fadeCell 0.3s 2.55s forwards; }
      .r6c6 { animation: fadeCell 0.3s 2.6s forwards; }
      /* Row 7 */
      .r7c0 { animation: fadeCell 0.3s 2.65s forwards; }
      .r7c1 { animation: fadeCell 0.3s 2.7s forwards; }
      .r7c2 { animation: fadeCell 0.3s 2.75s forwards; }
      .r7c3 { animation: fadeCell 0.3s 2.8s forwards; }
      .r7c4 { animation: fadeCell 0.3s 2.85s forwards; }
      .r7c5 { animation: fadeCell 0.3s 2.9s forwards; }
      .r7c6 { animation: fadeCell 0.3s 2.95s forwards; }
      /* Row 8 */
      .r8c0 { animation: fadeCell 0.3s 3.0s forwards; }
      .r8c1 { animation: fadeCell 0.3s 3.05s forwards; }
      .r8c2 { animation: fadeCell 0.3s 3.1s forwards; }
      .r8c3 { animation: fadeCell 0.3s 3.15s forwards; }
      .r8c4 { animation: fadeCell 0.3s 3.2s forwards; }
      .r8c5 { animation: fadeCell 0.3s 3.25s forwards; }
      .r8c6 { animation: fadeCell 0.3s 3.3s forwards; }

      #insight1 { opacity: 0; animation: slideIn 0.5s 3.5s forwards; }
      #insight2 { opacity: 0; animation: slideIn 0.5s 3.9s forwards; }
      #insight3 { opacity: 0; animation: slideIn 0.5s 4.3s forwards; }
    </style>

    <!-- Gradient definitions for heat levels -->
    <linearGradient id="legendGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#f8fafc"/>
      <stop offset="25%"  stop-color="#bfdbfe"/>
      <stop offset="60%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="640" height="380" fill="#f8fafc" rx="12"/>
  <rect width="640" height="44" fill="#1e293b" rx="12"/>
