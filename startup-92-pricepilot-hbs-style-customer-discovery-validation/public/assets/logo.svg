<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon background circle -->
  <circle cx="60" cy="60" r="50" fill="url(#bg)" />

  <!-- Rocket icon -->
  <g transform="translate(60,60)">
    <!-- Rocket body -->
    <ellipse cx="0" cy="-8" rx="10" ry="18" fill="white" opacity="0.95"/>
    <!-- Nose cone -->
    <path d="M-10,-8 Q0,-30 10,-8 Z" fill="white"/>
    <!-- Fins -->
    <path d="M-10,8 L-18,22 L-6,18 Z" fill="#c4b5fd"/>
    <path d="M10,8 L18,22 L6,18 Z" fill="#c4b5fd"/>
    <!-- Window -->
    <circle cx="0" cy="-10" r="4" fill="#4f46e5"/>
    <circle cx="0" cy="-10" r="2.5" fill="#a78bfa"/>
    <!-- Flame -->
    <ellipse cx="-3" cy="14" rx="2.5" ry="4" fill="#fbbf24" opacity="0.9"/>
    <ellipse cx="3" cy="14" rx="2.5" ry="4" fill="#f97316" opacity="0.9"/>
    <ellipse cx="0" cy="16" rx="2" ry="5" fill="#fef08a" opacity="0.8"/>
  </g>

  <!-- "PricePilot" text -->
  <text x="128" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#111827" letter-spacing="-0.5">Price</text>
  <text x="245" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#4f46e5" letter-spacing="-0.5">Pilot</text>

  <!-- Tagline -->
  <text x="128" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.2">Safe pricing experiments for solo founders</text>

  <!-- Decorative price up-arrow -->
  <g transform="translate(360, 35)">
    <rect x="-2" y="12" width="4" height="18" rx="2" fill="url(#arrow)"/>
    <polygon points="0,-4 -8,12 8,12" fill="url(#arrow)"/>
  </g>
</svg>
